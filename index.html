<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Senin İçin Bir Çiçek</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&family=Playfair+Display:ital,wght@1,600&family=Quicksand:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-top:#232049;
    --sky-mid:#5c3f66;
    --sky-horizon:#e79a7c;
    --ground-far:#2f2b46;
    --ground-near:#1b1830;
    --rose:#eb93a8;
    --rose-deep:#d66f8c;
    --gold:#eec468;
    --leaf:#5f8c5c;
    --leaf-deep:#3f6b46;
    --cream:#f7ecd9;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    width:100%;
    height:100%;
    background:var(--ground-near);
    overflow:hidden;
    overscroll-behavior:none;
    font-family:'Quicksand',sans-serif;
  }
  .stage{
    position:fixed;
    inset:0;
    width:100%;
    height:100vh;
    height:100dvh;
    background:
      radial-gradient(ellipse at 50% 8%, #f3c88a33 0%, transparent 55%),
      linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 45%, var(--sky-horizon) 78%, var(--ground-far) 79%, var(--ground-near) 100%);
    overflow:hidden;
  }

  /* stars */
  .stars{position:absolute; inset:0 0 45% 0;}
  .star{
    position:absolute; width:2px; height:2px; background:#fff; border-radius:50%;
    opacity:.0; animation:twinkle 3.5s ease-in-out infinite;
  }
  @keyframes twinkle{
    0%,100%{opacity:.15;}
    50%{opacity:.9;}
  }

  /* fireflies */
  .firefly{
    position:absolute; width:5px; height:5px; border-radius:50%;
    background:var(--gold);
    box-shadow:0 0 8px 3px #eec46888;
    opacity:0;
    animation: floaty 9s ease-in-out infinite, glow 2.6s ease-in-out infinite;
  }
  @keyframes floaty{
    0%{transform:translate(0,0);}
    25%{transform:translate(18px,-22px);}
    50%{transform:translate(-10px,-42px);}
    75%{transform:translate(-24px,-14px);}
    100%{transform:translate(0,0);}
  }
  @keyframes glow{
    0%,100%{opacity:.15;}
    50%{opacity:.85;}
  }

  .ground-line{
    position:absolute; left:0; right:0; bottom:0; height:22%;
    background:linear-gradient(180deg, var(--ground-far), var(--ground-near));
  }

  svg.scene{
    position:absolute; left:0; bottom:0; width:100%; height:100%;
  }

  .stem-path, .leaf-path, .grass-path{
    fill:none;
    stroke-linecap:round;
    stroke-linejoin:round;
  }

  .controls{
    position:absolute;
    bottom:max(3%, env(safe-area-inset-bottom));
    left:50%;
    transform:translateX(-50%);
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    align-items:center;
    justify-content:center;
    width:92%;
    max-width:340px;
    z-index:5;
  }
  .replay-btn{
    font-size:20px;
    width:44px;
    height:44px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    border:1px solid #f7ecd955;
    background:linear-gradient(135deg,#d66f8caa,#eec468aa);
    color:#2b2140;
    cursor:pointer;
    transition:transform .25s ease, box-shadow .25s ease;
  }
  .replay-btn:hover{transform:translateY(-2px); box-shadow:0 6px 18px #d66f8c55;}
  .replay-btn:active{transform:translateY(0);}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001s !important; transition-duration:0.001s !important;}
  }
</style>
</head>
<body>
<div class="stage" id="stage">
  <div class="stars" id="stars"></div>
  <div id="fireflies"></div>
  <svg class="scene" id="scene" viewBox="0 0 400 700" preserveAspectRatio="xMidYMax slice"></svg>

  <div class="controls">
    <button class="replay-btn" id="replayBtn" aria-label="Tekrar oynat" title="Tekrar oynat">✿</button>
  </div>
</div>

<script>
const svg = document.getElementById('scene');
const SVGNS = "http://www.w3.org/2000/svg";
const groundY = 560; // baseline where everything grows from, in viewBox coords

function el(tag, attrs){
  const e = document.createElementNS(SVGNS, tag);
  for(const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
}

// ---------- stars ----------
const starsWrap = document.getElementById('stars');
for(let i=0;i<45;i++){
  const s = document.createElement('div');
  s.className='star';
  s.style.left = Math.random()*100+'%';
  s.style.top = Math.random()*80+'%';
  s.style.animationDelay = (Math.random()*4)+'s';
  starsWrap.appendChild(s);
}

// ---------- fireflies ----------
const fireWrap = document.getElementById('fireflies');
for(let i=0;i<10;i++){
  const f = document.createElement('div');
  f.className='firefly';
  f.style.left = (15+Math.random()*70)+'%';
  f.style.top = (45+Math.random()*40)+'%';
  f.style.animationDelay = (Math.random()*6)+'s, '+(Math.random()*3)+'s';
  fireWrap.appendChild(f);
}

// ---------- helper: animate path drawing ----------
function drawPath(path, duration, delay){
  const len = path.getTotalLength();
  path.style.strokeDasharray = len;
  path.style.strokeDashoffset = len;
  path.getBoundingClientRect(); // force reflow
  path.style.transition = `stroke-dashoffset ${duration}ms cubic-bezier(.4,.1,.2,1) ${delay}ms`;
  requestAnimationFrame(()=>{ path.style.strokeDashoffset = 0; });
}

// ---------- grass blades ----------
function makeGrass(x, height, curve, hue, delay, width){
  const sway = (Math.random()*2-1)*4;
  const d = `M ${x} ${groundY} Q ${x+curve} ${groundY-height*0.55} ${x+curve*0.6+sway} ${groundY-height}`;
  const p = el('path', {
    d, class:'grass-path', stroke:hue, 'stroke-width': width, opacity:0.95
  });
  svg.appendChild(p);
  drawPath(p, 900+Math.random()*400, delay);
  // gentle continuous sway after growth
  setTimeout(()=>{
    p.style.transition='';
    p.animate([
      {transform:'rotate(0deg)'},
      {transform:`rotate(${sway>0?2.5:-2.5}deg)`},
      {transform:'rotate(0deg)'}
    ], {duration:3200+Math.random()*1400, iterations:Infinity, easing:'ease-in-out'});
    p.style.transformOrigin = `${x}px ${groundY}px`;
  }, delay+1300);
  return p;
}

// ---------- tiny daisy flowers ----------
function makeTinyFlower(x, delay, scale, petalColor, centerColor){
  const g = el('g', {transform:`translate(${x},${groundY}) scale(0)`, opacity:0});
  const stemH = 26*scale;
  const stem = el('path', {
    d:`M 0 0 Q ${2*scale} ${-stemH*0.6} 0 ${-stemH}`,
    stroke: '#5f8c5c', 'stroke-width':2*scale, fill:'none', 'stroke-linecap':'round'
  });
  g.appendChild(stem);
  const bloom = el('g', {transform:`translate(0,${-stemH})`});
  const petalCount = 5;
  for(let i=0;i<petalCount;i++){
    const angle = (360/petalCount)*i;
    const petal = el('ellipse', {
      cx:0, cy:-6*scale, rx:2.6*scale, ry:5.5*scale,
      fill:petalColor, transform:`rotate(${angle})`
    });
    bloom.appendChild(petal);
  }
  const center = el('circle', {cx:0, cy:0, r:2.4*scale, fill:centerColor});
  bloom.appendChild(center);
  g.appendChild(bloom);
  svg.appendChild(g);

  g.style.transition = `opacity 700ms ease ${delay}ms, transform 700ms cubic-bezier(.34,1.56,.64,1) ${delay}ms`;
  requestAnimationFrame(()=>{
    g.setAttribute('transform', `translate(${x},${groundY}) scale(${1})`);
    g.style.opacity = 1;
  });

  // gentle sway
  setTimeout(()=>{
    g.animate([
      {transform:`translate(${x}px,${groundY}px) rotate(0deg) scale(1)`},
      {transform:`translate(${x}px,${groundY}px) rotate(${Math.random()>0.5?2:-2}deg) scale(1)`},
      {transform:`translate(${x}px,${groundY}px) rotate(0deg) scale(1)`}
    ], {duration:3600+Math.random()*1200, iterations:Infinity, easing:'ease-in-out'});
  }, delay+700);
}

// ---------- main flower ----------
function buildMainFlower(){
  const cx = 200;
  const topY = 230; // where flower head center ends up
  const stemD = `M ${cx} ${groundY} C ${cx-10} 470, ${cx+18} 380, ${cx} ${topY+45}`;

  const stem = el('path', {
    d: stemD, class:'stem-path', stroke:'#4f8a4c', 'stroke-width':7
  });
  svg.appendChild(stem);
  drawPath(stem, 2200, 100);

  // leaves branching from stem
  const leaf1 = el('path', {
    d:`M ${cx-4} 470 C ${cx-55} 460, ${cx-70} 420, ${cx-40} 400 C ${cx-55} 430, ${cx-30} 455, ${cx-4} 470 Z`,
    fill:'#588f52', class:'leaf-path', 'stroke-width':0
  });
  const leaf2 = el('path', {
    d:`M ${cx+10} 400 C ${cx+62} 392, ${cx+78} 355, ${cx+50} 335 C ${cx+65} 362, ${cx+38} 388, ${cx+10} 400 Z`,
    fill:'#4d7f49', class:'leaf-path', 'stroke-width':0
  });
  [leaf1, leaf2].forEach((leaf, i)=>{
    leaf.style.opacity = 0;
    leaf.style.transform = 'scale(0)';
    leaf.style.transformOrigin = i===0? `${cx-4}px 470px` : `${cx+10}px 400px`;
    svg.appendChild(leaf);
    setTimeout(()=>{
      leaf.style.transition = 'opacity 700ms ease, transform 700ms cubic-bezier(.34,1.56,.64,1)';
      leaf.style.opacity = 1;
      leaf.style.transform = 'scale(1)';
    }, 1400 + i*250);
  });

  // flower head group -- stylized tulip
  const head = el('g', {transform:`translate(${cx},${topY}) scale(0)`, opacity:0});
  svg.appendChild(head);

  let defs = svg.querySelector('defs');
  if(!defs){ defs = el('defs',{}); svg.appendChild(defs); }

  const petalGrad = el('linearGradient', {id:'tulipGrad', x1:'0', y1:'1', x2:'0', y2:'0'});
  petalGrad.appendChild(el('stop', {offset:'0%','stop-color':'#a5233a'}));
  petalGrad.appendChild(el('stop', {offset:'55%','stop-color':'#e2445c'}));
  petalGrad.appendChild(el('stop', {offset:'100%','stop-color':'#f2707f'}));
  defs.appendChild(petalGrad);

  // single tulip petal shape (pointed, gently bulging), drawn upright, tip pointing up (-y)
  function tulipPetal(fill, height, width, opacity){
    return el('path', {
      d:`M 0 4 C -${width} -${height*0.18}, -${width*0.92} -${height*0.62}, 0 -${height}
         C ${width*0.92} -${height*0.62}, ${width} -${height*0.18}, 0 4 Z`,
      fill, opacity
    });
  }

  // back petals (form the base of the cup, slightly darker, wider stance)
  const backAngles = [-46, 46];
  const backPetals = [];
  backAngles.forEach(a=>{
    const g = el('g', {transform:`rotate(${a})`});
    const p = tulipPetal('#8c1f30', 58, 17, 0.98);
    g.appendChild(p);
    head.appendChild(g);
    backPetals.push(g);
  });

  // front petals: center + two sides forming the classic tulip cup
  const frontAngles = [-24, 0, 24];
  const frontPetals = [];
  frontAngles.forEach((a,i)=>{
    const g = el('g', {transform:`rotate(${a})`});
    const p = tulipPetal('url(#tulipGrad)', i===1?78:70, 20, 1);
    g.appendChild(p);
    head.appendChild(g);
    frontPetals.push(g);
  });

  // slim highlight streak on the center petal for a touch of realism
  const highlight = el('path', {
    d:'M 0 0 C -2 -22, -1 -48, 0 -66', stroke:'#ffb9c2', 'stroke-width':1.6,
    fill:'none', opacity:0.55, 'stroke-linecap':'round'
  });
  head.appendChild(highlight);

  // dark stamens peeking from the cup base (authentic tulip detail)
  for(let i=0;i<3;i++){
    const a = -20 + i*20;
    const rad = a*Math.PI/180;
    const stamen = el('line', {
      x1:0, y1:2, x2:Math.sin(rad)*10, y2:2-Math.cos(rad)*16,
      stroke:'#241018', 'stroke-width':2, 'stroke-linecap':'round'
    });
    head.appendChild(stamen);
  }

  setTimeout(()=>{
    head.style.transition = 'opacity 900ms ease, transform 1100ms cubic-bezier(.34,1.56,.64,1)';
    head.setAttribute('transform', `translate(${cx},${topY}) scale(1)`);
    head.style.opacity = 1;
  }, 1900);

  // petals ease open a touch after the initial bloom pop, like a tulip settling
  setTimeout(()=>{
    frontPetals.forEach((g,i)=>{
      const targetAngle = frontAngles[i] * 1.35;
      g.style.transition = 'transform 900ms cubic-bezier(.34,1.2,.64,1)';
      g.setAttribute('transform', `rotate(${targetAngle})`);
    });
    backPetals.forEach((g,i)=>{
      const targetAngle = backAngles[i] * 1.12;
      g.style.transition = 'transform 900ms cubic-bezier(.34,1.2,.64,1)';
      g.setAttribute('transform', `rotate(${targetAngle})`);
    });
  }, 2900);

  // gentle continuous sway of whole flower+stem after bloom
  setTimeout(()=>{
    const group = el('g');
    stem.animate([
      {transform:'rotate(0deg)'},
      {transform:'rotate(1.2deg)'},
      {transform:'rotate(0deg)'},
      {transform:'rotate(-1deg)'},
      {transform:'rotate(0deg)'}
    ], {duration:5200, iterations:Infinity, easing:'ease-in-out'});
    stem.style.transformOrigin = `${cx}px ${groundY}px`;
    head.animate([
      {transform:`translate(${cx}px,${topY}px) rotate(0deg) scale(1)`},
      {transform:`translate(${cx}px,${topY}px) rotate(2.2deg) scale(1)`},
      {transform:`translate(${cx}px,${topY}px) rotate(0deg) scale(1)`},
      {transform:`translate(${cx}px,${topY}px) rotate(-1.8deg) scale(1)`},
      {transform:`translate(${cx}px,${topY}px) rotate(0deg) scale(1)`}
    ], {duration:5200, iterations:Infinity, easing:'ease-in-out'});
  }, 3100);
}

function buildScene(){
  svg.innerHTML = '';

  // ground grasses, left and right of the main flower, varied heights
  const grassColors = ['#4d7f49','#5f8c5c','#3f6b46','#6a9964'];
  const grassSpots = [];
  for(let x=20; x<380; x+=14){
    if(x>170 && x<230) continue; // leave room for main flower
    grassSpots.push(x + (Math.random()*6-3));
  }
  grassSpots.forEach((x, i)=>{
    const h = 30 + Math.random()*55;
    const curve = (Math.random()*16-8);
    const color = grassColors[Math.floor(Math.random()*grassColors.length)];
    makeGrass(x, h, curve, color, 200 + i*35, 2.2+Math.random()*1.6);
  });

  // main flower
  buildMainFlower();

  // scattered tiny flowers
  const tinySpots = [40, 75, 110, 290, 325, 355, 60, 305];
  const petalPalette = ['#f2d16b','#f0a6b8','#eaf0d0','#c98fd6'];
  tinySpots.forEach((x, i)=>{
    const scale = 0.7+Math.random()*0.7;
    const petal = petalPalette[i % petalPalette.length];
    const center = petal === '#f2d16b' ? '#b5701f' : '#eec468';
    makeTinyFlower(x, 2600 + i*260, scale, petal, center);
  });
}

document.getElementById('replayBtn').addEventListener('click', buildScene);

buildScene();
</script>
</body>
</html>
